<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,700;1,9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=Work+Sans:wght@300;400;500;600&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg: #f1ece1;
    --ink: #16140f;
    --muted: #6f6a5e;
    --acid: #c8ff3e;
    --rule: rgba(22, 20, 15, 0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Work Sans', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 88% 8%, rgba(200, 255, 62, 0.28) 0%, transparent 42%),
      radial-gradient(circle at 4% 100%, rgba(200, 255, 62, 0.14) 0%, transparent 46%),
      var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 56px 72px 52px;
  }
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 22px;
    border-bottom: 2px solid var(--ink);
  }
  .brand { display: inline-flex; align-items: center; gap: 16px; }
  .brand-mark { width: 58px; height: 36px; fill: var(--ink); }
  .brand-name {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 26px;
    letter-spacing: 0.04em;
  }
  .top-right {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .mid { display: flex; flex-direction: column; align-items: flex-start; gap: 30px; }
  .acid-label {
    display: inline-flex;
    align-items: center;
    gap: 0.6em;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 19px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    background: var(--acid);
    padding: 10px 18px;
  }
  .acid-label::before { content: '●'; font-size: 0.7em; }
  .name {
    font-family: 'Fraunces', 'Times New Roman', serif;
    font-weight: 900;
    font-variation-settings: 'opsz' 144;
    font-size: 148px;
    line-height: 0.9;
    letter-spacing: -0.03em;
  }
  .name .ital { font-style: italic; font-weight: 400; }
  .tagline {
    font-family: 'Fraunces', 'Times New Roman', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 33px;
    line-height: 1.4;
    color: var(--muted);
  }
  .tagline .marker {
    color: var(--ink);
    background: linear-gradient(180deg, transparent 58%, var(--acid) 58%, var(--acid) 92%, transparent 92%);
    padding: 0 0.08em;
  }
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 22px;
    border-top: 1px solid var(--rule);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="top">
    <span class="brand">
      <svg class="brand-mark" viewBox="0 0 64 40">
        <rect x="2" y="26" width="10" height="12" rx="1.5"></rect>
        <rect x="18" y="16" width="10" height="22" rx="1.5"></rect>
        <rect x="34" y="8" width="10" height="30" rx="1.5"></rect>
        <rect x="50" y="2" width="10" height="36" rx="1.5"></rect>
      </svg>
      <span class="brand-name">h1sort.com</span>
    </span>
    <span class="top-right">Mexico City</span>
  </div>
  <div class="mid">
    <span class="acid-label">Data &amp; Analytics · AI</span>
    <h1 class="name">Carlos <span class="ital">Haro</span></h1>
    <p class="tagline">AI Engineer &amp; Technical Product Manager, shipping <span class="marker">data &amp; AI</span> end to end.</p>
  </div>
  <div class="bottom">
    <span>CV · Writing · Teaching · Contact</span>
    <span>carlos@h1sort.com</span>
  </div>
</body>
</html>
